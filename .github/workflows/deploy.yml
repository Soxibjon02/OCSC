name: OCSC Deploy — GitHub Pages + AWS S3 + CloudFront

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    name: Code Verification (Linting & Syntax Checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify HTML Files
        run: |
          npx -y htmlhint index.html
      - name: Verify Javascript Files Syntax
        run: |
          node --check js/app.js

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-aws:
    name: Deploy to AWS S3 & CloudFront
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_ENABLED == 'true' }}
    needs: deploy-github-pages
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync HTML files (correct content-type)
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "max-age=0, no-cache"

      - name: Sync CSS files
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.css" \
            --content-type "text/css; charset=utf-8" \
            --cache-control "max-age=86400"

      - name: Sync JavaScript files
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.js" \
            --content-type "application/javascript; charset=utf-8" \
            --cache-control "max-age=86400"

      - name: Sync image and other static files
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.svg" \
            --include "*.ico" \
            --include "*.gif" \
            --include "*.webp" \
            --cache-control "max-age=604800"

      - name: Remove excluded files and clean up
        run: |
          aws s3 rm s3://${{ secrets.AWS_S3_BUCKET }}/.git --recursive || true
          aws s3 rm s3://${{ secrets.AWS_S3_BUCKET }}/.github --recursive || true
          aws s3 rm s3://${{ secrets.AWS_S3_BUCKET }}/.vercel --recursive || true
          aws s3 rm s3://${{ secrets.AWS_S3_BUCKET }}/.vs --recursive || true

      - name: Invalidate CloudFront CDN Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
